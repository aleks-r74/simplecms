<div class="min-h-screen flex flex-col bg-base-100">
  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-none lg:invisible">
      <button
        class="btn btn-square btn-ghost"
        aria-label="open sidebar"
        (click)="toggleMobileSidebar()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>
    <div class="flex-1">
      <div
        class="text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent"
      >
        Lex Dev
      </div>
    </div>
    <div class="flex-none">
      <ul class="menu menu-horizontal px-1">
        @if(auth.isLoggedIn()) {
          <li><a routerLink="/new">New Page</a></li>
          <li><a (click)="auth.logout()">Logout</a></li>
        }
         @else {
        <li><a routerLink="/login">Login</a></li>
        }
      </ul>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex flex-1">
    <!-- Mobile overlay -->
    @if (mobileSidebarOpen) {
      <div class="fixed inset-0 bg-black/40 z-40 lg:hidden" (click)="closeMobileSidebar()"></div>
    }

    <div class="flex-1 bg-info/20">
      <div class="mx-auto flex w-full max-w-[1280px] h-full">
        <!-- Sidebar -->
        <aside
          class="fixed inset-y-0 left-0 z-50 w-64 bg-base-200 border-r transform transition-transform duration-300 lg:static lg:translate-x-0 lg:w-48 lg:flex lg:flex-col lg:items-center"
          [class.-translate-x-full]="!mobileSidebarOpen"
        >
          <nav class="menu p-4 mt-16 lg:mt-0" (click)="closeMobileSidebar()">
            <li><a class="font-medium">About</a></li>
            <li>
              <details open>
                <summary class="font-medium">Projects</summary>
                <ul>
                  <li><a>Simple CMS</a></li>
                  <li><a>Portfolio API</a></li>
                </ul>
              </details>
            </li>
            <li><a class="font-medium">Contact</a></li>
          </nav>
        </aside>

        <!-- Content Container -->
        <main class="flex-1 min-w-0 px-4 py-8 bg-base-200">
          <router-outlet/>
        </main>
      </div>
    </div>
  </div>

  <footer class="border-t bg-base-200 text-center py-1">
    <p class="text-sm text-base-content/60">© 2026 Lex — Built with Angular, Tailwind & DaisyUI</p>
  </footer>
</div>
