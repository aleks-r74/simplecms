<div class="max-w-3xl mx-auto px-4 py-10">

  <h1 class="text-3xl font-bold mb-2">
    {{ page?.title }}
  </h1>

  <div class="text-sm text-gray-500 mb-6">
    <span>Created: {{ page?.createdAt | date:'medium' }}</span>
    <span class="ml-4">Updated: {{ page?.updatedAt | date:'medium' }}</span>
  </div>

  <article class="prose max-w-none"
           [innerHTML]="safeHtml">
  </article>

</div>
