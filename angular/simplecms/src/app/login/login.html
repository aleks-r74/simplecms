<div class="flex justify-center items-center">
  <div class="card w-full max-w-sm shadow-lg bg-base-200 p-6">
    <h2 class="text-2xl font-bold text-center mb-4">Login</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="submit()">
      <!-- Email -->
      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">Username</span>
        </label>
        <input
          type="text"
          class="input input-bordered w-full"
          formControlName="username"
        />
        @if(loginForm.get('username')?.invalid && loginForm.get('username')?.touched){
            <label class="label">
            <span class="label-text-alt text-red-500">Valid username required</span>
            </label>
        }
      </div>

      <!-- Password -->
      <div class="form-control mb-6">
        <label class="label">
          <span class="label-text">Password</span>
        </label>
        <input
          type="password"
          class="input input-bordered w-full"
          formControlName="password"
        />
        @if(loginForm.get('password')?.invalid && loginForm.get('password')?.touched){
            <label class="label">
                <span class="label-text-alt text-red-500">Password is required</span>
            </label>
        }
      </div>

      <div class="form-control">
        <button type="submit" class="btn btn-primary w-full" [disabled]="loginForm.invalid">Login</button>
      </div>
    </form>

  </div>
</div>
